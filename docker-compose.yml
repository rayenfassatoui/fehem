name: fehem

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fehem-postgres
    environment:
      POSTGRES_DB: fehem
      POSTGRES_USER: fehem
      POSTGRES_PASSWORD: fehem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fehem -d fehem"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fehem-backend
    environment:
      DATABASE_URL: postgresql://fehem:fehem@postgres:5432/fehem
      FRONTEND_ORIGIN: http://localhost:3000
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_OPENAI_BASE_URL: https://integrate.api.nvidia.com/v1
      NVIDIA_EMBEDDING_MODEL: nvidia/llama-nemotron-embed-vl-1b-v2
      NVIDIA_CHAT_MODEL: stepfun-ai/step-3.5-flash
      NVIDIA_IMAGE_ENDPOINT: https://ai.api.nvidia.com/v1/genai/black-forest-labs/flux.2-klein-4b
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fehem-frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
